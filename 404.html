<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Seite nicht gefunden</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --ink: #1A1A1A; --mist: #F4F1EC; --sage: #8BAF9A; --terracotta: #C47B5A; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--mist);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}
.wrap { max-width: 400px; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { font-size: 72px; font-weight: 300; color: var(--sage); line-height: 1; }
h2 { font-size: 20px; font-weight: 500; margin: 12px 0 8px; }
p { font-size: 14px; color: #3D3D3D; line-height: 1.6; margin-bottom: 28px; }
.btn {
  display: inline-block;
  background: var(--sage);
  color: white;
  padding: 14px 32px;
  border-radius: 100px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  transition: background 0.2s;
}
.btn:hover { background: #6a9a7d; }
.sub { margin-top: 16px; font-size: 12px; opacity: 0.4; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🧹</div>
  <h1>404</h1>
  <h2>Diese Seite wurde bereits aufgeräumt</h2>
  <p>Die Seite, die Sie suchen, existiert nicht oder wurde verschoben. Aber keine Sorge — Julienne räumt alles auf.</p>
  <a href="/" class="btn">Zurück zur Startseite</a>
  <p class="sub">Julienne López · Reinigungsservice · Luzern & Zug</p>
</div>
</body>
</html>
